<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IWC Spider Web Hero — v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f4ff;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .hero {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    padding: 0 6vw;
  }
  .hero-content { max-width: 480px; z-index: 10; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #dbeafe;
    color: #1d4ed8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease 2.2s forwards;
  }
  h1 {
    font-size: clamp(28px, 4.5vw, 54px);
    font-weight: 800;
    color: #0f172a;
    line-height: 1.1;
    margin-bottom: 18px;
    letter-spacing: -1px;
    opacity: 0;
    animation: fadeUp 0.7s ease 2.4s forwards;
  }
  h1 em { font-style: normal; color: #2563eb; }
  .sub {
    font-size: 15px;
    color: #64748b;
    line-height: 1.65;
    margin-bottom: 30px;
    max-width: 380px;
    opacity: 0;
    animation: fadeUp 0.7s ease 2.6s forwards;
  }
  .cta-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s ease 2.8s forwards;
  }
  .btn-primary {
    background: #2563eb;
    color: #fff;
    padding: 13px 26px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.45); }
  .btn-secondary {
    background: transparent;
    color: #374151;
    padding: 13px 26px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #cbd5e1;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-secondary:hover { border-color: #2563eb; color: #2563eb; }
  .replay-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(255,255,255,0.92);
    border: 1px solid #e2e8f0;
    color: #374151;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.88);
    border: 1px solid #e2e8f0;
    backdrop-filter: blur(8px);
    color: #64748b;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 20px;
    z-index: 100;
    white-space: nowrap;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="label">🕷️ Move your mouse over the web</div>
<canvas id="c"></canvas>

<div class="hero">
  <div class="hero-content">
    <div class="badge">Beaufort, SC · Est. 2010</div>
    <h1>Agency-Quality<br>Websites.<br><em>Small Business</em><br>Prices.</h1>
    <p class="sub">Custom-built websites that convert visitors into customers — without the agency price tag. One-on-one service from start to finish.</p>
    <div class="cta-group">
      <button class="btn-primary">Get a Free Quote</button>
      <button class="btn-secondary">See Our Work →</button>
    </div>
  </div>
</div>

<button class="replay-btn" onclick="restartAnim()">↺ Replay</button>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, origin, spokeAngles, ringDists;
let startTime = null;
let mouse = { x: -9999, y: -9999 };

const ANIM_MS    = 2400;   // total animation duration
const SHOOT_END  = 0.055;  // how fast the initial shot fires (fraction of anim)
const SPOKE_START = 0.05;  // when spokes begin erupting
const RING_START  = 0.20;  // when rings start filling in

// ── Shockwave rings ─────────────────────────────────────────
let shockwaves = []; // { t: 0-1, born: timestamp }

// ── Build geometry ───────────────────────────────────────────
function buildWeb() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Wrist: just off right edge, ~38% down
  origin = { x: W * 1.035, y: H * 0.40 };

  // 18 spokes fanning LEFT (95° → 262°)
  const NS = 18;
  const A0 = Math.PI * 0.528;
  const A1 = Math.PI * 1.455;
  spokeAngles = [];
  for (let i = 0; i < NS; i++) {
    const t = i / (NS - 1);
    const jitter = Math.sin(i * 7.3 + 1.1) * 0.007;
    spokeAngles.push(A0 + (A1 - A0) * t + jitter);
  }

  // 14 rings, log-spaced
  const NR = 14;
  const MAX_R = Math.hypot(W, H) * 0.97;
  ringDists = [];
  for (let r = 0; r < NR; r++) {
    const t = (r + 1) / NR;
    const base = MAX_R * Math.log(1 + t * (Math.E - 1));
    ringDists.push(base * (1 + Math.sin(r * 3.7) * 0.012));
  }
}

function pt(angle, dist) {
  return { x: origin.x + Math.cos(angle) * dist,
           y: origin.y + Math.sin(angle) * dist };
}

// ── Draw one strand with mouse distortion + sag ──────────────
function strand(p1, p2, rgba, weight, sag) {
  const mx = (p1.x + p2.x) * 0.5;
  const my = (p1.y + p2.y) * 0.5;
  const dx = mouse.x - mx, dy = mouse.y - my;
  const d  = Math.hypot(dx, dy);
  const pull = Math.max(0, 1 - d / 130) * 18;
  const cpx = mx + dx * pull * 0.045;
  const cpy = my + dy * pull * 0.045 + (sag || 0);

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(cpx, cpy, p2.x, p2.y);
  ctx.strokeStyle = rgba;
  ctx.lineWidth   = weight;
  ctx.lineCap     = 'round';
  ctx.stroke();
}

// ── Origin burst flash ────────────────────────────────────────
function drawBurst(progress) {
  if (progress <= 0) return;
  // Expanding shockwave rings
  const maxR = 80;
  [0, 0.15, 0.30].forEach(offset => {
    const p = Math.max(0, Math.min(1, (progress - offset) / 0.55));
    if (p <= 0) return;
    const r = maxR * p;
    const op = (1 - p) * 0.55;
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(37,99,235,${op})`;
    ctx.lineWidth = (1 - p) * 3.5;
    ctx.stroke();
  });

  // Bright core
  const coreOp = Math.max(0, 1 - progress * 2.5) * 0.9;
  if (coreOp > 0) {
    const grad = ctx.createRadialGradient(origin.x, origin.y, 0, origin.x, origin.y, 32);
    grad.addColorStop(0, `rgba(147,197,253,${coreOp})`);
    grad.addColorStop(0.4, `rgba(37,99,235,${coreOp * 0.5})`);
    grad.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 32, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Permanent glow dot
  const dotOp = Math.min(1, progress * 3) * 0.85;
  ctx.beginPath();
  ctx.arc(origin.x, origin.y, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(37,99,235,${dotOp})`;
  ctx.fill();
}

// ── Shooting strand effect ────────────────────────────────────
function drawShoot(raw) {
  const p = Math.min(raw / SHOOT_END, 1);
  if (p <= 0) return;

  // Target: far left anchor
  const target = { x: W * 0.05, y: H * 0.32 };
  const cur = {
    x: origin.x + (target.x - origin.x) * p,
    y: origin.y + (target.y - origin.y) * p
  };

  // Glowing outer stroke
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(147,197,253,${0.7 * (1 - p * 0.4)})`;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Bright core
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(37,99,235,${0.95 * (1 - p * 0.3)})`;
  ctx.lineWidth = 2.2;
  ctx.stroke();

  // Tip flash
  if (p < 1) {
    const grad = ctx.createRadialGradient(cur.x, cur.y, 0, cur.x, cur.y, 14);
    grad.addColorStop(0, 'rgba(147,197,253,0.7)');
    grad.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.beginPath();
    ctx.arc(cur.x, cur.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Anchor flash when strand hits
  if (p >= 0.98) {
    const ap = Math.min(1, (p - 0.98) / 0.02);
    const ag = ctx.createRadialGradient(target.x, target.y, 0, target.x, target.y, 22 * ap);
    ag.addColorStop(0, `rgba(147,197,253,${0.6 * (1 - ap)})`);
    ag.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.beginPath();
    ctx.arc(target.x, target.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = ag;
    ctx.fill();
  }
}

// ── Main render ───────────────────────────────────────────────
function draw(ts) {
  if (!startTime) startTime = ts;
  const raw  = Math.min((ts - startTime) / ANIM_MS, 1);
  const ease = 1 - Math.pow(1 - raw, 3);

  ctx.clearRect(0, 0, W, H);

  // 1. Origin burst
  drawBurst(raw / 0.55);

  // 2. Shooting strand
  drawShoot(raw);

  // 3. Spokes — explode outward almost simultaneously
  spokeAngles.forEach((angle, i) => {
    // Very tight stagger — all spokes burst out in ~0.12s window
    const p = Math.max(0, Math.min(1,
      (ease - SPOKE_START - i * 0.004) / 0.46
    ));
    if (p <= 0) return;

    const maxR = ringDists[ringDists.length - 1];

    // Glow layer
    strand(origin, pt(angle, maxR * p),
      `rgba(147,197,253,${0.22 * p})`, 3.2, 0);
    // Core strand — thick and visible
    strand(origin, pt(angle, maxR * p),
      `rgba(37,99,235,${0.45 * p})`,   1.4, 0);
  });

  // 4. Rings
  ringDists.forEach((dist, ri) => {
    const p = Math.max(0, Math.min(1,
      (ease - RING_START - ri * 0.048) / 0.36
    ));
    if (p <= 0) return;

    const segsTotal = spokeAngles.length - 1;
    const segsVis   = p * segsTotal;
    const segsFull  = Math.floor(segsVis);
    const frac      = segsVis - segsFull;

    // Inner rings: thicker, more opaque
    const depthFactor = 1 - ri / ringDists.length;
    const opGlow  = 0.08 + depthFactor * 0.14;
    const opCore  = 0.18 + depthFactor * 0.30;
    const wGlow   = 2.8  - depthFactor * 0.8;
    const wCore   = 1.1  - depthFactor * 0.2;

    for (let s = 0; s < segsFull; s++) {
      const a1 = spokeAngles[s], a2 = spokeAngles[s + 1];
      const p1 = pt(a1, dist), p2 = pt(a2, dist);
      const sag = Math.abs(p2.x - p1.x) * 0.038 + Math.abs(p2.y - p1.y) * 0.008;
      // Glow halo
      strand(p1, p2, `rgba(147,197,253,${opGlow})`, wGlow, sag * 1.3);
      // Core
      strand(p1, p2, `rgba(37,99,235,${opCore})`,   wCore, sag);
    }

    // Partial segment
    if (segsFull < segsTotal && frac > 0) {
      const a1 = spokeAngles[segsFull], a2 = spokeAngles[segsFull + 1];
      const p1 = pt(a1, dist), p2f = pt(a2, dist);
      const p2 = { x: p1.x + (p2f.x - p1.x) * frac, y: p1.y + (p2f.y - p1.y) * frac };
      const sag = Math.abs(p2f.x - p1.x) * 0.038 * frac;
      strand(p1, p2, `rgba(147,197,253,${opGlow})`, wGlow, sag);
      strand(p1, p2, `rgba(37,99,235,${opCore})`,   wCore, sag);
    }

    // Intersection nodes
    if (p > 0.8) {
      for (let s = 0; s <= segsFull && s < spokeAngles.length; s++) {
        const n = pt(spokeAngles[s], dist);
        if (n.x < 0 || n.x > W || n.y < 0 || n.y > H) continue;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(37,99,235,${0.35 * depthFactor})`;
        ctx.fill();
      }
    }
  });

  requestAnimationFrame(draw);
}

// ── Events ────────────────────────────────────────────────────
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('resize', buildWeb);

window.restartAnim = function () {
  startTime = null;
  document.querySelectorAll('.badge, h1, .sub, .cta-group').forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
};

buildWeb();
requestAnimationFrame(draw);
</script>
</body>
</html>
