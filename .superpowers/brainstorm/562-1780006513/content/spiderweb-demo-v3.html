<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IWC – Spider Web Hero v3 (Comic Click)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0f4ff; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; }

canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }

/* ── Mouse ────────────────────────────────────────── */
#mouse-wrap {
  position: fixed;
  right: -8px;
  top: 50%;
  transform: translateY(-50%) translateX(180px); /* starts off-screen */
  width: 90px;
  height: 135px;
  z-index: 20;
  transition: transform 0.55s cubic-bezier(0.34,1.46,0.64,1);
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
  cursor: default;
}
#mouse-wrap.in-position {
  transform: translateY(-50%) translateX(0);
}
#mouse-svg {
  width: 90px;
  height: 135px;
  display: block;
  transform: rotate(-90deg);
  transform-origin: center center;
}
/* Left button click state */
#mouse-wrap.clicking #left-btn {
  fill: #7ab4f0;
  filter: drop-shadow(0 0 8px rgba(59,130,246,1));
}
#left-btn { transition: fill 0.08s, filter 0.08s; }

/* ── USB dongle ───────────────────────────────────── */
#usb-dongle {
  position: fixed;
  z-index: 19;
  right: -8px;
  top: 50%;
  transform: translateY(-50%) translateX(180px) rotate(-90deg) translateX(70px);
  transition: transform 0.55s cubic-bezier(0.34,1.46,0.64,1);
  opacity: 0.85;
}
#usb-dongle.in-position {
  transform: translateY(-50%) translateX(0) rotate(-90deg) translateX(70px);
}

/* ── Hero text ────────────────────────────────────── */
.hero {
  position:fixed; inset:0;
  display:flex; align-items:center;
  padding:0 6vw;
  pointer-events:none;
}
.hero-content { max-width:480px; z-index:10; pointer-events:all; }
.badge {
  display:inline-flex; align-items:center; gap:6px;
  background:#dbeafe; color:#1d4ed8;
  font-size:11px; font-weight:600; letter-spacing:2px;
  padding:5px 14px; border-radius:20px; margin-bottom:20px;
  text-transform:uppercase;
  opacity:0; animation:fadeUp 0.6s ease 2.8s forwards;
}
h1 {
  font-size:clamp(26px,4.2vw,52px); font-weight:800;
  color:#0f172a; line-height:1.1;
  margin-bottom:18px; letter-spacing:-1px;
  opacity:0; animation:fadeUp 0.7s ease 3.0s forwards;
}
h1 em { font-style:normal; color:#2563eb; }
.sub {
  font-size:15px; color:#64748b; line-height:1.65;
  margin-bottom:28px; max-width:380px;
  opacity:0; animation:fadeUp 0.7s ease 3.2s forwards;
}
.cta-group {
  display:flex; gap:12px; flex-wrap:wrap;
  opacity:0; animation:fadeUp 0.7s ease 3.4s forwards;
}
.btn-primary {
  background:#2563eb; color:#fff;
  padding:13px 26px; border-radius:6px;
  font-size:14px; font-weight:600;
  cursor:pointer; border:none;
  box-shadow:0 4px 14px rgba(37,99,235,0.35);
  transition:transform 0.15s, box-shadow 0.15s;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(37,99,235,0.45); }
.btn-secondary {
  background:transparent; color:#374151;
  padding:13px 26px; border-radius:6px;
  font-size:14px; font-weight:600;
  cursor:pointer; border:1.5px solid #cbd5e1;
  transition:border-color 0.15s, color 0.15s;
}
.btn-secondary:hover { border-color:#2563eb; color:#2563eb; }

/* ── UI chrome ────────────────────────────────────── */
.label {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.9); border:1px solid #e2e8f0;
  backdrop-filter:blur(8px); color:#64748b;
  font-size:11px; padding:6px 16px; border-radius:20px;
  z-index:100; white-space:nowrap;
}
.replay-btn {
  position:fixed; bottom:24px; right:24px;
  background:rgba(255,255,255,0.92); border:1px solid #e2e8f0;
  color:#374151; padding:9px 18px; border-radius:6px;
  font-size:12px; font-weight:600; cursor:pointer; z-index:100;
  backdrop-filter:blur(8px);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="label">🕷️ Watch the click — then move your mouse over the web</div>
<canvas id="c"></canvas>

<!-- The Mouse -->
<div id="mouse-wrap">
  <svg id="mouse-svg" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Drop shadow shape -->
    <ellipse cx="42" cy="64" rx="31" ry="47" fill="rgba(0,0,0,0.18)" transform="translate(2,4)"/>
    <!-- Main body -->
    <path d="M14,52 Q12,16 40,6 Q68,16 66,52 Q66,96 40,112 Q14,96 14,52Z" fill="#5c6a7a"/>
    <!-- Left button -->
    <path id="left-btn" d="M14,52 L14,27 Q14,6 40,6 L40,55 L14,55Z" fill="#4a5869"/>
    <!-- Right button -->
    <path d="M66,52 L66,27 Q66,6 40,6 L40,55 L66,55Z" fill="#526070"/>
    <!-- Center seam -->
    <line x1="40" y1="6" x2="40" y2="55" stroke="#28343f" stroke-width="1.6"/>
    <!-- Button/body divider -->
    <path d="M14,55 Q20,59 40,59 Q60,59 66,55" stroke="#28343f" stroke-width="1.2" fill="none"/>
    <!-- Scroll wheel housing -->
    <rect x="32" y="16" width="16" height="27" rx="8" fill="#243040"/>
    <!-- Scroll wheel -->
    <rect x="34" y="18" width="12" height="23" rx="6" fill="#1a2530"/>
    <rect x="34" y="22" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="26.5" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="31" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="35.5" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <!-- DPI button -->
    <rect x="34" y="47" width="12" height="7" rx="3.5" fill="#243040"/>
    <rect x="36" y="48.5" width="8" height="4" rx="2" fill="#1a2530"/>
    <!-- Body highlight -->
    <path d="M21,32 Q23,15 40,9 Q54,15 56,28" stroke="rgba(255,255,255,0.16)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Left button highlight -->
    <path d="M17,42 Q16,22 32,12" stroke="rgba(255,255,255,0.10)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>
</div>

<!-- USB Dongle -->
<div id="usb-dongle">
  <svg viewBox="0 0 28 14" width="28" height="14" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="28" height="14" rx="3" fill="#2a3540"/>
    <rect x="2" y="2" width="24" height="10" rx="2" fill="#1e2a35"/>
    <rect x="8" y="4" width="12" height="6" rx="1.5" fill="#c99a14"/>
    <rect x="10" y="5.5" width="8" height="3" rx="1" fill="#a07a0a"/>
  </svg>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <div class="badge">Beaufort, SC · Est. 2010</div>
    <h1>Agency-Quality<br>Websites.<br><em>Small Business</em><br>Prices.</h1>
    <p class="sub">Custom-built websites that convert visitors into customers — without the agency price tag. One-on-one service from start to finish.</p>
    <div class="cta-group">
      <button class="btn-primary">Get a Free Quote</button>
      <button class="btn-secondary">See Our Work →</button>
    </div>
  </div>
</div>

<button class="replay-btn" onclick="restartAnim()">↺ Replay</button>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const mouseEl = document.getElementById('mouse-wrap');

let W, H, origin;
let spokeAngles, ringDists;
let animStart  = null;
let webOrigin  = null;
let cursorPos  = { x:-9999, y:-9999 };

// Pre-generate 26 action lines (fixed so replay is consistent)
const ACTION_LINES = Array.from({length:26}, (_,i) => ({
  angle: (i / 26) * Math.PI * 2,
  len: 65 + (i * 19) % 90,
  w: 0.7 + (i * 0.11) % 1.1
}));

// ── Timeline (seconds) ──────────────────────────────────────────
const T = {
  MOUSE_ARRIVE : 0.20,  // mouse slides in
  MOUSE_SETTLED: 0.72,  // mouse in position
  BTN_GLOW     : 0.85,  // left button lights up
  CLICK        : 1.05,  // THE CLICK
  ACTION_LINES : 1.05,  // action lines burst
  WEB_SHOOT    : 1.12,  // initial shoot strand
  WEB_BUILD    : 1.22,  // spokes + rings
  TOTAL        : 3.80
};

// ── Setup ───────────────────────────────────────────────────────
function setup() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Estimate web origin from mouse element position
  // The mouse SVG is rotated -90deg so buttons face LEFT
  // We use right:-8 + offset for visual left tip
  const mouseRight = 8;
  const svgW = 90, svgH = 135;
  // After -90deg rotation: visual width ≈ svgH=135, visual height ≈ svgW=90
  const visualW = svgH; // 135
  // Visual left edge ≈ W - mouseRight - visualW + small margin
  const ox = W - mouseRight - visualW + 16;
  const oy = H * 0.50;
  webOrigin = { x: ox, y: oy };
  origin    = webOrigin;

  buildWebGeometry();
}

function buildWebGeometry() {
  // 18 spokes fanning LEFT (95° → 262°)
  const NS = 18;
  const A0 = Math.PI * 0.528;
  const A1 = Math.PI * 1.455;
  spokeAngles = [];
  for (let i = 0; i < NS; i++) {
    const t = i / (NS - 1);
    const jitter = Math.sin(i * 7.3 + 1.1) * 0.007;
    spokeAngles.push(A0 + (A1 - A0) * t + jitter);
  }

  // 14 rings, log-spaced
  const NR = 14;
  const MAX_R = Math.hypot(W, H) * 0.97;
  ringDists = [];
  for (let r = 0; r < NR; r++) {
    const t = (r + 1) / NR;
    const base = MAX_R * Math.log(1 + t * (Math.E - 1));
    ringDists.push(base * (1 + Math.sin(r * 3.7) * 0.012));
  }
}

function pt(angle, dist) {
  return { x: origin.x + Math.cos(angle)*dist, y: origin.y + Math.sin(angle)*dist };
}

// ── Strand renderer ─────────────────────────────────────────────
function strand(p1, p2, rgba, weight, sag) {
  const mx = (p1.x+p2.x)*0.5, my = (p1.y+p2.y)*0.5;
  const dx = cursorPos.x-mx, dy = cursorPos.y-my;
  const pull = Math.max(0, 1-Math.hypot(dx,dy)/130) * 20;
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(mx+dx*pull*0.04, my+dy*pull*0.04+(sag||0), p2.x, p2.y);
  ctx.strokeStyle = rgba;
  ctx.lineWidth   = weight;
  ctx.lineCap     = 'round';
  ctx.stroke();
}

// ── Comic: screen flash ─────────────────────────────────────────
function drawScreenFlash(t) {
  // t: 0-1, brief white-then-gone flash
  if (t <= 0 || t >= 1) return;
  const alpha = t < 0.35 ? t/0.35 : 1-(t-0.35)/0.65;
  ctx.save();
  ctx.globalAlpha = alpha * 0.55;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ── Comic: action lines burst ───────────────────────────────────
function drawActionLines(cx, cy, t) {
  if (t <= 0 || t >= 1) return;
  const fade   = Math.max(0, 1 - t/0.55);
  const extend = Math.min(t/0.18, 1);
  ACTION_LINES.forEach(l => {
    const r1 = 55 * extend;
    const r2 = (55 + l.len) * extend;
    ctx.beginPath();
    // Glow
    ctx.moveTo(cx + Math.cos(l.angle)*r1, cy + Math.sin(l.angle)*r1);
    ctx.lineTo(cx + Math.cos(l.angle)*r2, cy + Math.sin(l.angle)*r2);
    ctx.strokeStyle = `rgba(147,197,253,${fade*0.5})`;
    ctx.lineWidth   = (l.w + 1.8);
    ctx.lineCap     = 'round';
    ctx.stroke();
    // Core
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(l.angle)*r1, cy + Math.sin(l.angle)*r1);
    ctx.lineTo(cx + Math.cos(l.angle)*r2, cy + Math.sin(l.angle)*r2);
    ctx.strokeStyle = `rgba(37,99,235,${fade*0.75})`;
    ctx.lineWidth   = l.w;
    ctx.stroke();
  });
}

// ── Comic: starburst + CLICK! ───────────────────────────────────
function drawStarburst(cx, cy, t) {
  if (t <= 0) return;
  // scale: 0→1.25→1.0 (pop-in bounce)
  const scale = t < 0.25
    ? (t/0.25) * 1.28
    : t < 0.55
    ? 1.28 - (t-0.25)/0.30 * 0.28
    : t < 0.82
    ? 1.0
    : 1.0 - (t-0.82)/0.18;
  if (scale <= 0) return;

  const alpha = t < 0.7 ? 1 : 1-(t-0.7)/0.30;
  if (alpha <= 0) return;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx - 52, cy - 38); // offset up-left from click point
  ctx.rotate(-0.22);
  ctx.scale(scale, scale);

  // 12-pointed starburst
  ctx.beginPath();
  const pts = 12, oR = 58, iR = 30;
  for (let i = 0; i < pts*2; i++) {
    const r = i%2===0 ? oR : iR;
    const a = (i*Math.PI/pts) - Math.PI/2;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
          : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle   = '#FFE000';
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 2.5;
  ctx.fill();
  ctx.stroke();

  // Halftone dots inside starburst (comic book texture)
  ctx.save();
  ctx.clip();
  for (let dx = -55; dx < 55; dx += 10) {
    for (let dy = -55; dy < 55; dy += 10) {
      ctx.beginPath();
      ctx.arc(dx, dy, 2.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fill();
    }
  }
  ctx.restore();

  // "CLICK!" text
  ctx.fillStyle    = '#111';
  ctx.font         = '900 20px Impact, Arial Black, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  // Outline
  ctx.strokeStyle  = 'rgba(255,255,0,0.6)';
  ctx.lineWidth    = 3;
  ctx.strokeText('CLICK!', 0, 1);
  ctx.fillText('CLICK!', 0, 1);

  ctx.restore();
}

// ── Comic: origin glow dot ──────────────────────────────────────
function drawOriginGlow(t) {
  if (t <= 0) return;
  const op = Math.min(1, t*3) * 0.85;

  // Expanding rings from origin
  [0, 0.12, 0.24].forEach(off => {
    const p = Math.max(0, Math.min(1, (t-off)/0.5));
    if (p <= 0) return;
    const r  = 85 * p;
    const oa = (1-p) * 0.55;
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(37,99,235,${oa})`;
    ctx.lineWidth   = (1-p) * 4;
    ctx.stroke();
  });

  // Radial glow
  const g = ctx.createRadialGradient(origin.x,origin.y,0, origin.x,origin.y,28);
  g.addColorStop(0, `rgba(147,197,253,${op*0.8})`);
  g.addColorStop(0.4, `rgba(37,99,235,${op*0.35})`);
  g.addColorStop(1, 'rgba(37,99,235,0)');
  ctx.beginPath();
  ctx.arc(origin.x, origin.y, 28, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // Core dot
  ctx.beginPath();
  ctx.arc(origin.x, origin.y, 3.8, 0, Math.PI*2);
  ctx.fillStyle = `rgba(37,99,235,${op})`;
  ctx.fill();
}

// ── Initial shoot strand ────────────────────────────────────────
function drawShootStrand(t) {
  if (t <= 0) return;
  const p = Math.min(t/0.10, 1);
  const target = { x: W*0.04, y: H*0.30 };
  const cur = {
    x: origin.x + (target.x-origin.x)*p,
    y: origin.y + (target.y-origin.y)*p
  };
  // Glow
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(147,197,253,${0.65*(1-p*0.25)})`;
  ctx.lineWidth   = 6.5; ctx.lineCap = 'round'; ctx.stroke();
  // Core
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(37,99,235,${0.95*(1-p*0.2)})`;
  ctx.lineWidth   = 2.8; ctx.stroke();
  // Tip flash
  if (p < 0.96) {
    const tg = ctx.createRadialGradient(cur.x,cur.y,0, cur.x,cur.y,18);
    tg.addColorStop(0,'rgba(147,197,253,0.8)');
    tg.addColorStop(1,'rgba(37,99,235,0)');
    ctx.beginPath(); ctx.arc(cur.x,cur.y,18,0,Math.PI*2);
    ctx.fillStyle = tg; ctx.fill();
  }
}

// ── Web ─────────────────────────────────────────────────────────
function drawWeb(ease) {
  const SPOKE_DELAY = 0.0; // spokes start immediately when web starts
  const RING_START  = 0.18;

  // Spokes
  spokeAngles.forEach((angle, i) => {
    const p = Math.max(0, Math.min(1, (ease - SPOKE_DELAY - i*0.003) / 0.44));
    if (p <= 0) return;
    const maxR = ringDists[ringDists.length-1];
    const end  = pt(angle, maxR*p);
    strand(origin, end, `rgba(147,197,253,${0.20*p})`, 3.5, 0);
    strand(origin, end, `rgba(37,99,235,${0.45*p})`,   1.6, 0);
  });

  // Rings
  ringDists.forEach((dist, ri) => {
    const p = Math.max(0, Math.min(1, (ease - RING_START - ri*0.044) / 0.34));
    if (p <= 0) return;

    const total  = spokeAngles.length-1;
    const vis    = p * total;
    const full   = Math.floor(vis);
    const frac   = vis - full;
    const df     = 1 - ri/ringDists.length;
    const opGlow = 0.09 + df*0.13;
    const opCore = 0.20 + df*0.28;
    const wGlow  = 2.8  - df*0.6;
    const wCore  = 1.15 - df*0.15;

    for (let s = 0; s < full; s++) {
      const p1 = pt(spokeAngles[s], dist), p2 = pt(spokeAngles[s+1], dist);
      const sag = Math.abs(p2.x-p1.x)*0.040 + Math.abs(p2.y-p1.y)*0.008;
      strand(p1, p2, `rgba(147,197,253,${opGlow})`, wGlow, sag*1.3);
      strand(p1, p2, `rgba(37,99,235,${opCore})`,   wCore, sag);
    }
    if (full < total && frac > 0) {
      const p1 = pt(spokeAngles[full], dist), p2f = pt(spokeAngles[full+1], dist);
      const p2 = { x:p1.x+(p2f.x-p1.x)*frac, y:p1.y+(p2f.y-p1.y)*frac };
      const sag = Math.abs(p2f.x-p1.x)*0.040*frac;
      strand(p1, p2, `rgba(147,197,253,${opGlow})`, wGlow, sag);
      strand(p1, p2, `rgba(37,99,235,${opCore})`,   wCore, sag);
    }
    // Intersection nodes
    if (p > 0.78) {
      for (let s=0; s<=full && s<spokeAngles.length; s++) {
        const n = pt(spokeAngles[s], dist);
        if (n.x<0||n.x>W||n.y<0||n.y>H) continue;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.6, 0, Math.PI*2);
        ctx.fillStyle = `rgba(37,99,235,${0.38*df})`;
        ctx.fill();
      }
    }
  });
}

// ── Master render loop ──────────────────────────────────────────
function render(ts) {
  if (!animStart) animStart = ts;
  const elapsed = (ts - animStart) / 1000; // seconds

  ctx.clearRect(0, 0, W, H);

  // Screen flash at click moment
  drawScreenFlash(clamp01((elapsed - T.CLICK) / 0.45));

  // Origin shockwave (triggered by click)
  drawOriginGlow(clamp01((elapsed - T.CLICK) / 0.8));

  // Action lines
  drawActionLines(origin.x, origin.y, clamp01((elapsed - T.ACTION_LINES) / 0.55));

  // Starburst + CLICK!
  drawStarburst(origin.x, origin.y, clamp01((elapsed - T.CLICK) / 1.0));

  // Shoot strand
  drawShootStrand(clamp01((elapsed - T.WEB_SHOOT) / 0.45));

  // Web
  const webRaw  = clamp01((elapsed - T.WEB_BUILD) / (T.TOTAL - T.WEB_BUILD));
  const webEase = 1 - Math.pow(1 - webRaw, 3);
  if (webRaw > 0) drawWeb(webEase);

  // Mouse click glow timing
  if (elapsed >= T.BTN_GLOW && elapsed < T.CLICK + 0.18) {
    mouseEl.classList.add('clicking');
  } else {
    mouseEl.classList.remove('clicking');
  }

  requestAnimationFrame(render);
}

function clamp01(v) { return Math.max(0, Math.min(1, v)); }

// ── Mouse slide-in ──────────────────────────────────────────────
function startMouseSlideIn() {
  setTimeout(() => {
    mouseEl.classList.add('in-position');
    document.getElementById('usb-dongle').classList.add('in-position');
  }, T.MOUSE_ARRIVE * 1000);
}

// ── Events ──────────────────────────────────────────────────────
window.addEventListener('mousemove', e => { cursorPos.x=e.clientX; cursorPos.y=e.clientY; });
window.addEventListener('resize', () => { setup(); });

// ── Restart ─────────────────────────────────────────────────────
window.restartAnim = function() {
  animStart = null;
  mouseEl.classList.remove('in-position','clicking');
  document.getElementById('usb-dongle').classList.remove('in-position');
  document.querySelectorAll('.badge,h1,.sub,.cta-group').forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
  startMouseSlideIn();
};

// ── Init ─────────────────────────────────────────────────────────
setup();
startMouseSlideIn();
requestAnimationFrame(render);
</script>
