<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IWC – Spider Web Hero v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0f4ff; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; }

canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }

/* ── Mouse sits in top-right corner ── */
#mouse-wrap {
  position: fixed;
  top:  -18px;
  right: -18px;
  width: 90px;
  height: 135px;
  z-index: 20;
  transform: rotate(135deg) translate(160px, -160px); /* off-screen start */
  transition: transform 0.58s cubic-bezier(0.34,1.42,0.64,1);
  filter: drop-shadow(0 8px 28px rgba(0,0,0,0.40));
}
#mouse-wrap.in-position {
  transform: rotate(135deg) translate(0px, 0px);
}
#mouse-svg { width:90px; height:135px; display:block; }

/* left-button click flash */
#left-btn { transition: fill 0.08s, filter 0.08s; }
#mouse-wrap.clicking #left-btn {
  fill: #7ab4f0;
  filter: drop-shadow(0 0 10px rgba(59,130,246,1));
}

/* ── Hero text ── */
.hero {
  position:fixed; inset:0;
  display:flex; align-items:center;
  padding:0 6vw;
  pointer-events:none;
}
.hero-content { max-width:480px; z-index:10; pointer-events:all; }
.badge {
  display:inline-flex; align-items:center;
  background:#dbeafe; color:#1d4ed8;
  font-size:11px; font-weight:600; letter-spacing:2px;
  padding:5px 14px; border-radius:20px; margin-bottom:20px;
  text-transform:uppercase;
  opacity:0; animation:fadeUp 0.6s ease 2.8s forwards;
}
h1 {
  font-size:clamp(26px,4.2vw,52px); font-weight:800;
  color:#0f172a; line-height:1.1;
  margin-bottom:18px; letter-spacing:-1px;
  opacity:0; animation:fadeUp 0.7s ease 3.0s forwards;
}
h1 em { font-style:normal; color:#2563eb; }
.sub {
  font-size:15px; color:#64748b; line-height:1.65;
  margin-bottom:28px; max-width:380px;
  opacity:0; animation:fadeUp 0.7s ease 3.2s forwards;
}
.cta-group {
  display:flex; gap:12px; flex-wrap:wrap;
  opacity:0; animation:fadeUp 0.7s ease 3.4s forwards;
}
.btn-primary {
  background:#2563eb; color:#fff;
  padding:13px 26px; border-radius:6px;
  font-size:14px; font-weight:600;
  cursor:pointer; border:none;
  box-shadow:0 4px 14px rgba(37,99,235,0.35);
  transition:transform 0.15s, box-shadow 0.15s;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(37,99,235,0.45); }
.btn-secondary {
  background:transparent; color:#374151;
  padding:13px 26px; border-radius:6px;
  font-size:14px; font-weight:600;
  cursor:pointer; border:1.5px solid #cbd5e1;
  transition:border-color 0.15s, color 0.15s;
}
.btn-secondary:hover { border-color:#2563eb; color:#2563eb; }

.label {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.9); border:1px solid #e2e8f0;
  backdrop-filter:blur(8px); color:#64748b;
  font-size:11px; padding:6px 16px; border-radius:20px;
  z-index:100; white-space:nowrap;
}
.replay-btn {
  position:fixed; bottom:24px; right:24px;
  background:rgba(255,255,255,0.92); border:1px solid #e2e8f0;
  color:#374151; padding:9px 18px; border-radius:6px;
  font-size:12px; font-weight:600; cursor:pointer; z-index:100;
  backdrop-filter:blur(8px);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="label">🕷️ Move your mouse over the web</div>
<canvas id="c"></canvas>

<!-- Mouse — no USB dongle -->
<div id="mouse-wrap">
  <svg id="mouse-svg" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="42" cy="64" rx="31" ry="47" fill="rgba(0,0,0,0.18)" transform="translate(2,4)"/>
    <path d="M14,52 Q12,16 40,6 Q68,16 66,52 Q66,96 40,112 Q14,96 14,52Z" fill="#5c6a7a"/>
    <path id="left-btn" d="M14,52 L14,27 Q14,6 40,6 L40,55 L14,55Z" fill="#4a5869"/>
    <path d="M66,52 L66,27 Q66,6 40,6 L40,55 L66,55Z" fill="#526070"/>
    <line x1="40" y1="6" x2="40" y2="55" stroke="#28343f" stroke-width="1.6"/>
    <path d="M14,55 Q20,59 40,59 Q60,59 66,55" stroke="#28343f" stroke-width="1.2" fill="none"/>
    <rect x="32" y="16" width="16" height="27" rx="8" fill="#243040"/>
    <rect x="34" y="18" width="12" height="23" rx="6" fill="#1a2530"/>
    <rect x="34" y="22" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="26.5" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="31" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="35.5" width="12" height="2.2" rx="1.1" fill="#3d5168"/>
    <rect x="34" y="47" width="12" height="7" rx="3.5" fill="#243040"/>
    <rect x="36" y="48.5" width="8" height="4" rx="2" fill="#1a2530"/>
    <path d="M21,32 Q23,15 40,9 Q54,15 56,28" stroke="rgba(255,255,255,0.16)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M17,42 Q16,22 32,12" stroke="rgba(255,255,255,0.10)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <div class="badge">Beaufort, SC · Est. 2010</div>
    <h1>Agency-Quality<br>Websites.<br><em>Small Business</em><br>Prices.</h1>
    <p class="sub">Custom-built websites that convert visitors into customers — without the agency price tag. One-on-one service from start to finish.</p>
    <div class="cta-group">
      <button class="btn-primary">Get a Free Quote</button>
      <button class="btn-secondary">See Our Work →</button>
    </div>
  </div>
</div>

<button class="replay-btn" onclick="restartAnim()">↺ Replay</button>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const mouseEl = document.getElementById('mouse-wrap');

let W, H, origin, spokeAngles, ringDists;
let animStart = null;
let cursorPos = { x:-9999, y:-9999 };

// 28 action lines — fixed angles for consistency
const ACTION_LINES = Array.from({length:28}, (_,i) => ({
  angle: (i / 28) * Math.PI * 2,
  len:   60 + (i * 19) % 100,
  w:     0.7 + (i * 0.13) % 1.2
}));

// ── Timeline (seconds) ─────────────────────────────────────────
const T = {
  MOUSE_ARRIVE : 0.15,
  BTN_GLOW     : 0.78,
  CLICK        : 0.98,
  WEB_SHOOT    : 1.06,
  WEB_BUILD    : 1.18,
  TOTAL        : 3.80
};

// ── Setup ──────────────────────────────────────────────────────
function setup() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Origin = top-right corner (slight inset)
  origin = { x: W - 22, y: 22 };

  buildWebGeometry();
}

function buildWebGeometry() {
  // Spokes fan from upper-left (~148°) to straight down (268°)
  // This fans the web across the whole screen from the top-right corner
  const NS = 20;
  const A0 = Math.PI * 0.82;  // ~148° — toward upper-left
  const A1 = Math.PI * 1.49;  // ~268° — nearly straight down
  spokeAngles = [];
  for (let i = 0; i < NS; i++) {
    const t = i / (NS - 1);
    const jitter = Math.sin(i * 6.7 + 2.3) * 0.006;
    spokeAngles.push(A0 + (A1 - A0) * t + jitter);
  }

  // 15 rings, logarithmically spaced
  const NR = 15;
  const MAX_R = Math.hypot(W, H) * 1.02; // reach to opposite corner
  ringDists = [];
  for (let r = 0; r < NR; r++) {
    const t = (r + 1) / NR;
    const base = MAX_R * Math.log(1 + t * (Math.E - 1));
    ringDists.push(base * (1 + Math.sin(r * 3.7) * 0.011));
  }
}

function pt(angle, dist) {
  return { x: origin.x + Math.cos(angle)*dist, y: origin.y + Math.sin(angle)*dist };
}

// ── Strand with mouse distortion + sag ────────────────────────
function strand(p1, p2, rgba, weight, sag) {
  const mx = (p1.x+p2.x)*0.5, my = (p1.y+p2.y)*0.5;
  const dx = cursorPos.x-mx, dy = cursorPos.y-my;
  const pull = Math.max(0, 1-Math.hypot(dx,dy)/140) * 22;
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(mx+dx*pull*0.042, my+dy*pull*0.042+(sag||0), p2.x, p2.y);
  ctx.strokeStyle = rgba;
  ctx.lineWidth   = weight;
  ctx.lineCap     = 'round';
  ctx.stroke();
}

// ── Screen flash ───────────────────────────────────────────────
function drawScreenFlash(t) {
  if (t <= 0 || t >= 1) return;
  const a = t < 0.3 ? t/0.3 : 1-(t-0.3)/0.7;
  ctx.save();
  ctx.globalAlpha = a * 0.52;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ── Action lines ───────────────────────────────────────────────
function drawActionLines(t) {
  if (t <= 0 || t >= 1) return;
  const fade   = Math.max(0, 1 - t/0.55);
  const extend = Math.min(t/0.16, 1);
  const cx = origin.x, cy = origin.y;
  ACTION_LINES.forEach(l => {
    const r1 = 50  * extend;
    const r2 = (50 + l.len) * extend;
    // Glow
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(l.angle)*r1, cy+Math.sin(l.angle)*r1);
    ctx.lineTo(cx+Math.cos(l.angle)*r2, cy+Math.sin(l.angle)*r2);
    ctx.strokeStyle = `rgba(147,197,253,${fade*0.48})`;
    ctx.lineWidth = l.w + 2.2; ctx.lineCap='round'; ctx.stroke();
    // Core
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(l.angle)*r1, cy+Math.sin(l.angle)*r1);
    ctx.lineTo(cx+Math.cos(l.angle)*r2, cy+Math.sin(l.angle)*r2);
    ctx.strokeStyle = `rgba(37,99,235,${fade*0.78})`;
    ctx.lineWidth = l.w; ctx.stroke();
  });
}

// ── Starburst + CLICK! ─────────────────────────────────────────
function drawStarburst(t) {
  if (t <= 0) return;
  const scale = t < 0.22 ? (t/0.22)*1.30
              : t < 0.52 ? 1.30 - (t-0.22)/0.30*0.30
              : t < 0.80 ? 1.0
              : 1.0 - (t-0.80)/0.20;
  if (scale <= 0) return;
  const alpha = t < 0.72 ? 1 : 1-(t-0.72)/0.28;
  if (alpha <= 0) return;

  // Position: offset inward from corner so it's fully visible
  const cx = origin.x - 80;
  const cy = origin.y + 75;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.rotate(-0.18);
  ctx.scale(scale, scale);

  // 12-point starburst
  ctx.beginPath();
  const pts=12, oR=62, iR=32;
  for (let i=0; i<pts*2; i++) {
    const r = i%2===0 ? oR : iR;
    const a = (i*Math.PI/pts) - Math.PI/2;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
          : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle   = '#FFE000';
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 2.5;
  ctx.fill();
  ctx.stroke();

  // Halftone dots
  ctx.save();
  ctx.clip();
  for (let dx=-60; dx<60; dx+=10)
    for (let dy=-60; dy<60; dy+=10) {
      ctx.beginPath();
      ctx.arc(dx, dy, 2.4, 0, Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.08)';
      ctx.fill();
    }
  ctx.restore();

  // "CLICK!" text
  ctx.font         = '900 21px Impact, Arial Black, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle  = 'rgba(255,220,0,0.5)';
  ctx.lineWidth    = 3.5;
  ctx.strokeText('CLICK!', 0, 1);
  ctx.fillStyle = '#111';
  ctx.fillText('CLICK!', 0, 1);

  ctx.restore();
}

// ── Origin glow + shockwaves ───────────────────────────────────
function drawOriginGlow(t) {
  if (t <= 0) return;
  const cx = origin.x, cy = origin.y;

  // 3 expanding shockwave rings
  [0, 0.13, 0.26].forEach(off => {
    const p = Math.max(0, Math.min(1,(t-off)/0.52));
    if (p <= 0) return;
    const r  = 95 * p;
    const oa = (1-p) * 0.60;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(37,99,235,${oa})`;
    ctx.lineWidth   = (1-p)*4.5;
    ctx.stroke();
  });

  // Radial bloom
  const op = Math.min(1, t*2.8) * 0.85;
  const g  = ctx.createRadialGradient(cx,cy,0, cx,cy,32);
  g.addColorStop(0, `rgba(147,197,253,${op*0.85})`);
  g.addColorStop(0.4,`rgba(37,99,235,${op*0.38})`);
  g.addColorStop(1, 'rgba(37,99,235,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 32, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();

  // Bright dot
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI*2);
  ctx.fillStyle = `rgba(37,99,235,${op})`;
  ctx.fill();
}

// ── Shoot strand ───────────────────────────────────────────────
function drawShootStrand(t) {
  if (t <= 0) return;
  const p = Math.min(t/0.10, 1);
  // Shoots toward lower-left (main diagonal from top-right)
  const target = { x: W*0.12, y: H*0.78 };
  const cur = { x: origin.x+(target.x-origin.x)*p, y: origin.y+(target.y-origin.y)*p };

  // Glow halo
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(147,197,253,${0.68*(1-p*0.22)})`;
  ctx.lineWidth=7; ctx.lineCap='round'; ctx.stroke();
  // Core
  ctx.beginPath();
  ctx.moveTo(origin.x, origin.y);
  ctx.lineTo(cur.x, cur.y);
  ctx.strokeStyle = `rgba(37,99,235,${0.95*(1-p*0.18)})`;
  ctx.lineWidth=3; ctx.stroke();
  // Moving tip flash
  if (p < 0.96) {
    const tg = ctx.createRadialGradient(cur.x,cur.y,0, cur.x,cur.y,20);
    tg.addColorStop(0,'rgba(147,197,253,0.85)');
    tg.addColorStop(1,'rgba(37,99,235,0)');
    ctx.beginPath(); ctx.arc(cur.x,cur.y,20,0,Math.PI*2);
    ctx.fillStyle=tg; ctx.fill();
  }
}

// ── Web spokes + rings ─────────────────────────────────────────
function drawWeb(ease) {
  // Spokes burst out
  spokeAngles.forEach((angle, i) => {
    const p = clamp01((ease - i*0.003) / 0.46);
    if (p <= 0) return;
    const maxR = ringDists[ringDists.length-1];
    strand(origin, pt(angle, maxR*p), `rgba(147,197,253,${0.18*p})`, 3.8, 0);
    strand(origin, pt(angle, maxR*p), `rgba(37,99,235,${0.46*p})`,   1.7, 0);
  });

  // Rings fill in outward
  const RING_START = 0.18;
  ringDists.forEach((dist, ri) => {
    const p = clamp01((ease - RING_START - ri*0.044) / 0.34);
    if (p <= 0) return;
    const total = spokeAngles.length-1;
    const vis   = p * total;
    const full  = Math.floor(vis);
    const frac  = vis - full;
    const df    = 1 - ri/ringDists.length;
    const opG   = 0.08 + df*0.14;
    const opC   = 0.18 + df*0.30;
    const wG    = 3.0  - df*0.7;
    const wC    = 1.25 - df*0.15;

    for (let s=0; s<full; s++) {
      const p1 = pt(spokeAngles[s],dist), p2 = pt(spokeAngles[s+1],dist);
      const sag = Math.abs(p2.x-p1.x)*0.038 + Math.abs(p2.y-p1.y)*0.010;
      strand(p1,p2,`rgba(147,197,253,${opG})`,wG, sag*1.4);
      strand(p1,p2,`rgba(37,99,235,${opC})`,  wC, sag);
    }
    if (full < total && frac > 0) {
      const p1 = pt(spokeAngles[full],dist), p2f = pt(spokeAngles[full+1],dist);
      const p2 = { x:p1.x+(p2f.x-p1.x)*frac, y:p1.y+(p2f.y-p1.y)*frac };
      const sag = Math.abs(p2f.x-p1.x)*0.038*frac;
      strand(p1,p2,`rgba(147,197,253,${opG})`,wG,sag);
      strand(p1,p2,`rgba(37,99,235,${opC})`,  wC,sag);
    }
    if (p > 0.78) {
      for (let s=0; s<=full && s<spokeAngles.length; s++) {
        const n = pt(spokeAngles[s],dist);
        if (n.x<0||n.x>W||n.y<0||n.y>H) continue;
        ctx.beginPath();
        ctx.arc(n.x,n.y,1.8,0,Math.PI*2);
        ctx.fillStyle=`rgba(37,99,235,${0.40*df})`;
        ctx.fill();
      }
    }
  });
}

// ── Master loop ────────────────────────────────────────────────
function render(ts) {
  if (!animStart) animStart = ts;
  const e = (ts - animStart) / 1000;
  ctx.clearRect(0,0,W,H);

  drawScreenFlash(clamp01((e - T.CLICK) / 0.42));
  drawOriginGlow(clamp01((e - T.CLICK) / 0.82));
  drawActionLines(clamp01((e - T.CLICK) / 0.58));
  drawStarburst(clamp01((e - T.CLICK) / 1.0));
  drawShootStrand(clamp01((e - T.WEB_SHOOT) / 0.48));

  const wr = clamp01((e - T.WEB_BUILD) / (T.TOTAL - T.WEB_BUILD));
  if (wr > 0) drawWeb(1 - Math.pow(1-wr, 3));

  // Button glow window
  if (e >= T.BTN_GLOW && e < T.CLICK + 0.20) mouseEl.classList.add('clicking');
  else mouseEl.classList.remove('clicking');

  requestAnimationFrame(render);
}

function clamp01(v) { return Math.max(0, Math.min(1,v)); }

// ── Mouse slide in ─────────────────────────────────────────────
function startMouseSlideIn() {
  setTimeout(() => mouseEl.classList.add('in-position'), T.MOUSE_ARRIVE * 1000);
}

// ── Restart ────────────────────────────────────────────────────
window.restartAnim = function() {
  animStart = null;
  mouseEl.classList.remove('in-position','clicking');
  document.querySelectorAll('.badge,h1,.sub,.cta-group').forEach(el => {
    el.style.animation='none'; void el.offsetHeight; el.style.animation='';
  });
  startMouseSlideIn();
};

window.addEventListener('mousemove', e => { cursorPos.x=e.clientX; cursorPos.y=e.clientY; });
window.addEventListener('resize', setup);

setup();
startMouseSlideIn();
requestAnimationFrame(render);
</script>
</body>
</html>
